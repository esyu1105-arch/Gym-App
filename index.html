<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>Gym Tempo Pro</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">

    <style>
        /* ── Design tokens ── */
        :root {
            --green:  rgb(0,255,136);
            --red:    rgb(255,68,68);
            --yellow: rgb(255,193,7);
            --dim:    rgb(120,120,120);
            --mid:    rgb(170,170,170);
            --bg:     rgb(18,18,18);
            --card:   rgb(34,34,34);
        }

        /* ── Base ── */
        * { box-sizing: border-box; }
        body {
            background: var(--bg);
            color: #fff;
            text-align: center;
            font-family: -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* ── Screen wrapper ── */
        .screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }
        .hidden { display: none !important; }

        /* ── Home screen ── */
        .slogan-text {
            color: var(--green);
            font-size: 4.5rem;
            font-weight: 900;
            margin: -60px 0 10px;
            font-style: italic;
            text-shadow: 3px 3px 15px rgba(0,255,136,0.4);
            line-height: 1.1;
        }
        .countdown-text {
            font-size: 1.2rem;
            color: var(--red);
            margin-bottom: 8px;
            font-weight: 900;
            letter-spacing: 1px;
            min-height: 1.5rem;
        }
        .target-title-main {
            font-size: 0.95rem;
            margin: 0 0 5px;
            color: var(--mid);
            white-space: nowrap;
            letter-spacing: 0.5px;
        }
        .target-title-sub {
            font-size: 0.75rem;
            margin: 0;
            color: var(--dim);
            font-weight: bold;
        }

        /* ── Inputs ── */
        .input-group { display: flex; gap: 10px; margin-bottom: 10px; }
        input {
            background: var(--card);
            border: 2px solid var(--green);
            color: #fff;
            padding: 10px;
            font-size: 1.4rem;
            border-radius: 12px;
            width: 90px;
            text-align: center;
        }

        /* ── Buttons ── */
        button {
            padding: 18px 30px;
            font-size: 1.3rem;
            border: none;
            border-radius: 18px;
            font-weight: 700;
            min-width: 105px;
            cursor: pointer;
        }
        .btn-go   { background: var(--green);  color: #000; min-width: 160px; }
        .btn-plus { background: var(--yellow); color: #000; margin-bottom: 10px; min-width: 160px; }
        .btn-stop { background: var(--red);    color: #fff; }
        .btn-skip { background: var(--mid);    color: #000; }
        .btn-reset{ background: rgb(68,68,68); color: #fff; }
        .btn-end  { background: rgb(100,100,100); color: #fff; }

        /* ── Training screen ── */
        .rep-info { color: var(--green); font-size: 1.8rem; font-weight: 600; }
        .main-display {
            font-size: 8rem;
            font-weight: 900;
            margin: 10px 0;
            line-height: 1.1;
            min-height: 9rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ── Rest screen ── */
        .rest-title { font-size: 2rem; color: #fff; margin: 0; }
        #diu-msg {
            color: var(--red);
            font-weight: 900;
            font-size: 1.8rem;
            min-height: 2.2rem;
            margin-bottom: 5px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <!-- Silent audio: keeps audio session alive on iOS so speech works in background -->
    <audio id="silent-audio" loop preload="auto">
        <source src="data:audio/wav;base64,UklGRigAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQQAAAAAAA==" type="audio/wav">
    </audio>

    <!-- ══ Home Screen ══ -->
    <div class="screen" id="h">
        <p class="slogan-text">肥豬王<br>瘦撚梗</p>
        <div class="countdown-text" id="cd-display"></div>
        <h1 class="target-title-main">Enter Reps for T1, T2 and Sets</h1>
        <div class="input-group">
            <div style="display:flex;flex-direction:column;gap:5px">
                <span class="target-title-sub">REPS 1</span>
                <input type="number" id="tr1-in" value="10" min="1">
            </div>
            <div style="display:flex;flex-direction:column;gap:5px">
                <span class="target-title-sub">REPS 2</span>
                <input type="number" id="tr2-in" value="10" min="0">
            </div>
            <div style="display:flex;flex-direction:column;gap:5px">
                <span class="target-title-sub">SETS</span>
                <input type="number" id="ts-in" value="4" min="1">
            </div>
        </div>
        <button class="btn-go" onclick="triggerStart()">START SESSION</button>
    </div>

    <!-- ══ Training Screen ══ -->
    <div class="screen hidden" id="train-scr">
        <div class="rep-info" id="status-label">Set 1 / 4 | T1</div>
        <div class="main-display" id="count-label">READY</div>
        <div style="display:flex;gap:8px">
            <button class="btn-stop" id="pause-btn" onclick="triggerPause()">STOP</button>
            <button class="btn-reset" onclick="restartCurrentPhase()">RESET</button>
            <button class="btn-end"   onclick="resetToHome()">END</button>
        </div>
    </div>

    <!-- ══ Rest Screen ══ -->
    <div class="screen hidden" id="rest-scr">
        <h2 class="rest-title">RESTING...</h2>
        <div id="diu-msg"></div>
        <div class="main-display" id="rest-clock" style="color:var(--green)">60</div>
        <button class="btn-plus" onclick="addTenSeconds()">比多10秒抖抖氣</button>
        <button class="btn-skip" onclick="skipRest()">SKIP REST</button>
    </div>

    <!-- ══ Congrats Screen ══ -->
    <div class="screen hidden" id="co">
        <div class="main-display" style="font-size:2.2rem;color:var(--green);padding:20px;line-height:1.4">
            Congratulations!<br>Session Complete!
        </div>
        <button class="btn-go" onclick="resetToHome()">DONE</button>
    </div>

    <!-- ══ Script 1: Countdown (standalone) ══ -->
    <script>
        (function initCountdown() {
            function render() {
                const target = new Date(2026, 4, 24).getTime(); // May 24 2026
                const diff   = target - Date.now();
                const el     = document.getElementById('cd-display');
                if (!el) return;
                if (diff > 0) {
                    const totalDays = Math.floor(diff / 86_400_000);
                    el.textContent  = `🔥 最後衝刺 🔥 : ${Math.floor(totalDays / 7)} weeks ${totalDays % 7} days`;
                } else {
                    el.textContent = '🔥 大日子已到！ 🔥';
                }
            }
            render();
            // Refresh every minute in case the app stays open overnight
            setInterval(render, 60_000);
        })();
    </script>

    <!-- ══ Script 2: Core logic ══ -->
    <script>
    (() => {
        // ── State ──────────────────────────────────────────────────────────────
        const state = {
            rep: 1, count: 1, currentSet: 1,
            plusCount: 0, timeLeft: 60,
            isT2: false, isPaused: false,
            targetReps1: 10, targetReps2: 10, targetSets: 4,
        };

        // ── Timers (kept at module level for easy clearing) ────────────────────
        let timer        = null;   // main tempo tick
        let restTimer    = null;   // rest countdown
        let t2Interval   = null;   // T2 transition countdown
        let activeTimeouts = [];   // scheduled one-shots
        let wakeLock     = null;

        // ── DOM shortcuts ──────────────────────────────────────────────────────
        const $ = id => document.getElementById(id);
        const SCREENS = ['h', 'train-scr', 'rest-scr', 'co'];

        function showScreen(id) {
            SCREENS.forEach(s => $(s).classList.toggle('hidden', s !== id));
        }

        // ── Wake Lock ──────────────────────────────────────────────────────────
        async function requestWakeLock() {
            try {
                if ('wakeLock' in navigator)
                    wakeLock = await navigator.wakeLock.request('screen');
            } catch (_) {}
        }

        function releaseWakeLock() {
            wakeLock?.release().then(() => { wakeLock = null; });
        }

        document.addEventListener('visibilitychange', () => {
            if (wakeLock && document.visibilityState === 'visible') requestWakeLock();
        });

        // ── Speech ─────────────────────────────────────────────────────────────
        const sp = window.speechSynthesis;

        function speak(txt, rate = 1.1) {
            try {
                if (sp.speaking) sp.cancel();
                const u = new SpeechSynthesisUtterance(txt);
                u.lang = 'en-US'; u.rate = rate;
                sp.speak(u);
            } catch (_) {}
        }

        // ── Timeout helpers ────────────────────────────────────────────────────
        function scheduleTimeout(fn, ms) {
            const id = setTimeout(fn, ms);
            activeTimeouts.push(id);
            return id;
        }

        function clearAllTimeouts() {
            activeTimeouts.forEach(clearTimeout);
            activeTimeouts = [];
        }

        // ── Clear all timers ───────────────────────────────────────────────────
        function clearAllTimers() {
            clearInterval(timer); clearInterval(restTimer); clearInterval(t2Interval);
            clearAllTimeouts();
            timer = restTimer = t2Interval = null;
        }

        // ── Pause / Resume ─────────────────────────────────────────────────────
        window.triggerPause = function() {
            state.isPaused = !state.isPaused;
            const btn = $('pause-btn');
            if (state.isPaused) {
                sp.cancel();                                    // BUG FIX: cancel in-flight speech
                btn.textContent        = 'RESUME';
                btn.style.background   = 'var(--green)';
                btn.style.color        = '#000';
                $('silent-audio').pause();
            } else {
                btn.textContent        = 'STOP';
                btn.style.background   = 'var(--red)';
                btn.style.color        = '#fff';
                $('silent-audio').play().catch(() => {});
            }
        };

        // ── Session start ──────────────────────────────────────────────────────
        window.triggerStart = function() {
            const parse = (id, fallback, min) => {
                const v = parseInt($(id).value);
                return isNaN(v) || v < min ? fallback : v;
            };
            state.targetReps1 = parse('tr1-in', 1, 1);
            state.targetReps2 = parse('tr2-in', 0, 0);
            state.targetSets  = parse('ts-in',  1, 1);
            state.currentSet  = 1;
            state.isT2        = false;
            requestWakeLock();
            startSet();
        };

        // ── Reset to Home ──────────────────────────────────────────────────────
        window.resetToHome = function() {
            clearAllTimers();
            sp.cancel();
            releaseWakeLock();
            showScreen('h');
        };

        // ── Restart current phase ──────────────────────────────────────────────
        window.restartCurrentPhase = function() {
            clearInterval(timer); clearInterval(t2Interval);
            clearAllTimeouts();
            timer = t2Interval = null;
            sp.cancel();
            state.isT2 ? transitionToT2(true) : startSet();
        };

        // ── Start a set ────────────────────────────────────────────────────────
        function startSet() {
            showScreen('train-scr');
            state.rep = 1; state.count = 1; state.isPaused = false;

            const btn = $('pause-btn');
            btn.textContent      = 'STOP';
            btn.style.background = 'var(--red)';
            btn.style.color      = '#fff';

            const lbl = $('count-label');
            lbl.textContent  = 'READY';
            lbl.style.color  = 'rgb(255,235,59)';

            $('status-label').textContent = `Set ${state.currentSet} / ${state.targetSets} | T1`;

            $('silent-audio').play().catch(() => {});

            speak('Ready', 1.0);
            let t = 0;
            ['3','2','1'].forEach(n => {
                scheduleTimeout(() => { lbl.textContent = n; speak(n); }, (++t) * 1000);
            });
            scheduleTimeout(() => {
                lbl.textContent = 'GO';
                lbl.style.color = 'var(--green)';
                speak('GO', 1.2);
                scheduleTimeout(runLogic, 1000);
            }, ++t * 1000);
        }

        // ── Main tempo tick ────────────────────────────────────────────────────
        function runLogic() {
            const lbl = $('count-label');
            lbl.style.color = 'var(--green)';

            function tick() {
                if (state.isPaused) return;

                const target = state.isT2 ? state.targetReps2 : state.targetReps1;

                // Display: rep number on beat 1, then 2 / 3 / 4
                lbl.textContent = (state.count === 1) ? state.rep : state.count;
                speak(lbl.textContent.toString());

                // End of final rep's final beat → transition
                if (state.rep >= target && state.count >= 4) {
                    clearInterval(timer);
                    scheduleTimeout(() => {
                        if (!state.isT2 && state.targetReps2 > 0) {
                            transitionToT2(false);
                        } else {
                            finishSet();
                        }
                    }, 1000);
                    return;
                }

                state.count++;
                if (state.count > 4) { state.count = 1; state.rep++; }
            }

            tick(); // fire immediately to avoid 1-second dead air after GO
            timer = setInterval(tick, 1000);
        }

        // ── T1 → T2 transition ─────────────────────────────────────────────────
        function transitionToT2(isRestart) {
            state.isT2 = true; state.rep = 1; state.count = 1;
            const lbl = $('count-label');
            lbl.textContent = 'T2 READY';
            lbl.style.color = 'rgb(255,235,59)';
            $('status-label').textContent = `Set ${state.currentSet} / ${state.targetSets} | T2`;
            speak(isRestart ? 'Restarting Training 2. Ready.' : 'Training 1 complete. Ready for Training 2', 1.0);

            let tLeft = 6;
            t2Interval = setInterval(() => {
                if (state.isPaused) return;
                tLeft--;
                lbl.textContent = tLeft > 0 ? tLeft : 'GO';
                if (tLeft > 0 && tLeft <= 3) speak(tLeft.toString());
                if (tLeft <= 0) {
                    clearInterval(t2Interval);
                    lbl.style.color = 'var(--green)';
                    speak('GO', 1.2);
                    scheduleTimeout(runLogic, 1000);
                }
            }, 1000);
        }

        // ── Finish set ─────────────────────────────────────────────────────────
        function finishSet() {
            if (state.currentSet >= state.targetSets) {
                showFinalCongrats();
            } else {
                state.isT2 = false;
                startRest();
            }
        }

        // ── Rest countdown ─────────────────────────────────────────────────────
        function startRest() {
            showScreen('rest-scr');
            state.plusCount = 0; state.timeLeft = 60;

            $('diu-msg').textContent     = '';
            $('rest-clock').style.color  = 'var(--green)';
            $('rest-clock').textContent  = state.timeLeft;

            restTimer = setInterval(() => {
                if (state.isPaused) return;          // BUG FIX: respect pause during rest

                state.timeLeft--;
                $('rest-clock').textContent = state.timeLeft;
                if (state.timeLeft === 10) speak('10 seconds left', 1.0);
                if (state.timeLeft > 0 && state.timeLeft <= 3) speak(state.timeLeft.toString());
                if (state.timeLeft <= 0) {
                    clearInterval(restTimer);
                    state.currentSet++;
                    startSet();
                }
            }, 1000);
        }

        window.addTenSeconds = function() {
            if (state.plusCount < 2) {
                state.timeLeft += 10;
                state.plusCount++;
                $('rest-clock').textContent = state.timeLeft;
                speak('Ten more seconds', 1.1);
            } else {
                $('diu-msg').textContent    = 'Diu你咩抖咁耐';
                $('rest-clock').style.color = 'var(--red)';
                speak('Stop resting', 1.0);
            }
        };

        window.skipRest = function() {
            clearInterval(restTimer);
            state.currentSet++;
            state.isT2 = false;
            startSet();
        };

        // ── Congrats ───────────────────────────────────────────────────────────
        function showFinalCongrats() {
            speak('Congratulations! Session Complete!', 1.0);
            showScreen('co');
        }

    })(); // end IIFE
    </script>
</body>
</html>
