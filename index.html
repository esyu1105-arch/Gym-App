<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>Gym Tempo Pro</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">

    <style>
        :root {
            --green:  rgb(0,255,136);
            --red:    rgb(255,68,68);
            --yellow: rgb(255,235,59);
            --amber:  rgb(255,193,7);
            --dim:    rgb(80,80,80);
            --mid:    rgb(170,170,170);
            --bg:     rgb(18,18,18);
            --card:   rgb(34,34,34);
        }

        * { box-sizing: border-box; }

        body {
            background: var(--bg);
            color: #fff;
            text-align: center;
            font-family: -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .screen { display: flex; flex-direction: column; align-items: center; gap: 12px; }
        .hidden { display: none !important; }

        /* ── Home ── */
        .slogan-text {
            color: var(--green);
            font-size: 4.5rem;
            font-weight: 900;
            margin: -60px 0 10px;
            font-style: italic;
            text-shadow: 3px 3px 15px rgba(0,255,136,0.4);
            line-height: 1.1;
        }
        .countdown-text {
            font-size: 1.2rem;
            color: var(--red);
            margin-bottom: 8px;
            font-weight: 900;
            letter-spacing: 1px;
            min-height: 1.5rem;
        }
        .target-title-main {
            font-size: 0.95rem;
            margin: 0 0 5px;
            color: var(--mid);
            white-space: nowrap;
            letter-spacing: 0.5px;
        }
        .target-title-sub {
            font-size: 0.75rem;
            margin: 0;
            color: rgb(120,120,120);
            font-weight: bold;
        }
        .input-group { display: flex; gap: 10px; margin-bottom: 10px; }
        input {
            background: var(--card);
            border: 2px solid var(--green);
            color: #fff;
            padding: 10px;
            font-size: 1.4rem;
            border-radius: 12px;
            width: 90px;
            text-align: center;
        }

        /* ── Buttons ── */
        button {
            padding: 18px 30px;
            font-size: 1.3rem;
            border: none;
            border-radius: 18px;
            font-weight: 700;
            min-width: 105px;
            cursor: pointer;
        }
        .btn-go    { background: var(--green); color: #000; min-width: 160px; }
        .btn-plus  { background: var(--amber); color: #000; }
        .btn-stop  { background: var(--red);   color: #fff; }
        .btn-skip  { background: var(--mid);   color: #000; }
        .btn-reset { background: rgb(68,68,68);    color: #fff; }
        .btn-end   { background: rgb(100,100,100); color: #fff; }

        /* ── Training screen ── */
        .rep-info { color: var(--green); font-size: 1.8rem; font-weight: 600; }

        .main-display {
            font-size: 8rem;
            font-weight: 900;
            margin: 6px 0 0;
            line-height: 1.1;
            min-height: 9rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ── Beat dots (Point 1) ── */
        .beat-dots {
            display: flex;
            gap: 14px;
            justify-content: center;
            margin: 4px 0 10px;
            height: 28px;
            align-items: center;
        }
        .beat-dot {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: var(--dim);
            transition: background 0.08s, box-shadow 0.08s;
        }
        .beat-dot.active {
            background: var(--green);
            box-shadow: 0 0 12px var(--green);
        }
        .beat-dots.invisible { visibility: hidden; }

        /* ── Rest screen ── */
        .rest-title { font-size: 2rem; color: #fff; margin: 0; }
        #diu-msg {
            color: var(--red);
            font-weight: 900;
            font-size: 1.8rem;
            min-height: 2.2rem;
            margin-bottom: 5px;
            text-transform: uppercase;
        }
        .rest-btn-row { display: flex; gap: 10px; }
    </style>
</head>
<body>

    <audio id="silent-audio" loop preload="auto">
        <source src="data:audio/wav;base64,UklGRigAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQQAAAAAAA==" type="audio/wav">
    </audio>

    <!-- ══ Home Screen ══ -->
    <div class="screen" id="h">
        <p class="slogan-text">肥豬王<br>瘦撚梗</p>
        <div class="countdown-text" id="cd-display"></div>
        <h1 class="target-title-main">Enter Reps for T1, T2 and Sets</h1>
        <div class="input-group">
            <div style="display:flex;flex-direction:column;gap:5px">
                <span class="target-title-sub">REPS 1</span>
                <input type="number" id="tr1-in" value="10" min="1">
            </div>
            <div style="display:flex;flex-direction:column;gap:5px">
                <span class="target-title-sub">REPS 2</span>
                <input type="number" id="tr2-in" value="10" min="0">
            </div>
            <div style="display:flex;flex-direction:column;gap:5px">
                <span class="target-title-sub">SETS</span>
                <input type="number" id="ts-in" value="4" min="1">
            </div>
        </div>
        <button class="btn-go" onclick="triggerStart()">START SESSION</button>
    </div>

    <!-- ══ Training Screen ══ -->
    <div class="screen hidden" id="train-scr">
        <div class="rep-info" id="status-label">Set 1 / 4 | T1</div>

        <!-- Point 1: big rep number + 4 beat dots below -->
        <div class="main-display" id="count-label">準備</div>
        <div class="beat-dots invisible" id="beat-dots">
            <div class="beat-dot" id="dot-1"></div>
            <div class="beat-dot" id="dot-2"></div>
            <div class="beat-dot" id="dot-3"></div>
            <div class="beat-dot" id="dot-4"></div>
        </div>

        <div style="display:flex;gap:8px">
            <button class="btn-stop"  id="pause-btn" onclick="triggerPause()">暫停</button>
            <button class="btn-reset" onclick="restartCurrentPhase()">重來</button>
            <button class="btn-end"   onclick="resetToHome()">結束</button>
        </div>
    </div>

    <!-- ══ Rest Screen ══ -->
    <div class="screen hidden" id="rest-scr">
        <h2 class="rest-title">RESTING...</h2>
        <div id="diu-msg"></div>
        <div class="main-display" id="rest-clock" style="color:var(--green)">60</div>

        <!-- Point 3: pause button on rest screen -->
        <div class="rest-btn-row">
            <button class="btn-stop" id="rest-pause-btn" onclick="triggerPause()">暫停</button>
            <button class="btn-plus" onclick="addTenSeconds()">比多10秒抖抖氣</button>
        </div>
        <button class="btn-skip" onclick="skipRest()">SKIP REST</button>
    </div>

    <!-- ══ Congrats Screen ══ -->
    <div class="screen hidden" id="co">
        <div class="main-display" style="font-size:2.2rem;color:var(--green);padding:20px;line-height:1.4">
            Congratulations!<br>Session Complete!
        </div>
        <button class="btn-go" onclick="resetToHome()">DONE</button>
    </div>

    <!-- ══ Countdown ══ -->
    <script>
        (function initCountdown() {
            function render() {
                const target = new Date(2026, 4, 24).getTime();
                const diff   = target - Date.now();
                const el     = document.getElementById('cd-display');
                if (!el) return;
                if (diff > 0) {
                    const totalDays = Math.floor(diff / 86_400_000);
                    el.textContent = `🔥 最後衝刺 🔥 : ${Math.floor(totalDays / 7)} weeks ${totalDays % 7} days`;
                } else {
                    el.textContent = '🔥 大日子已到！ 🔥';
                }
            }
            render();
            setInterval(render, 60_000);
        })();
    </script>

    <!-- ══ Core Logic ══ -->
    <script>
    (() => {

        // ── Point 8: Cantonese text map ────────────────────────────────────────
        // lang = zh-HK → Cantonese TTS on iOS/macOS/Android/Windows
        // Chinese characters ensure correct Cantonese pronunciation
        const T = {
            ready:     '準備',
            go:        '開始',
            cdNums:    ['3','2','1'],      // display
            cdSpeak:   ['三','二','一'],   // spoken in Cantonese
            beats:     ['一','二','三','四'],   // spoken on each beat; beat 1 replaced by rep number
            tenLeft:   '還有十秒',
            tenMore:   '多十秒',
            stopRest:  '夠喇，唔好再抖',
            t1Done:    '第一組完成，準備第二組',
            t2Restart: '重新開始第二組，準備',
            congrats:  '恭喜，今日訓練完成',
        };

        // ── State ──────────────────────────────────────────────────────────────
        const state = {
            rep: 1, count: 1, currentSet: 1,
            plusCount: 0, timeLeft: 60,
            isT2: false, isPaused: false,
            targetReps1: 10, targetReps2: 10, targetSets: 4,
        };

        // ── Timers ─────────────────────────────────────────────────────────────
        let timer = null, restTimer = null, t2Interval = null;
        let activeTimeouts = [];
        let wakeLock = null;

        // ── DOM ────────────────────────────────────────────────────────────────
        const $ = id => document.getElementById(id);
        const SCREENS = ['h', 'train-scr', 'rest-scr', 'co'];
        const DOTS = [1,2,3,4].map(i => $(`dot-${i}`));

        function showScreen(id) {
            SCREENS.forEach(s => $(s).classList.toggle('hidden', s !== id));
        }

        // ── Beat dots helper ───────────────────────────────────────────────────
        // activeBeat: 1-4 fills dots progressively; 0 = reset all off
        function setBeatDots(activeBeat, visible) {
            $('beat-dots').classList.toggle('invisible', !visible);
            DOTS.forEach((d, i) => d.classList.toggle('active', i < activeBeat));
        }

        // ── Wake Lock ──────────────────────────────────────────────────────────
        async function requestWakeLock() {
            try { if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); }
            catch (_) {}
        }
        function releaseWakeLock() {
            wakeLock?.release().then(() => { wakeLock = null; });
        }
        document.addEventListener('visibilitychange', () => {
            if (wakeLock && document.visibilityState === 'visible') requestWakeLock();
        });

        // ── Speech (zh-HK = Cantonese) ────────────────────────────────────────
        const sp = window.speechSynthesis;
        function speak(txt, rate = 1.1) {
            try {
                if (sp.speaking) sp.cancel();
                const u = new SpeechSynthesisUtterance(txt);
                u.lang = 'zh-HK';
                u.rate = rate;
                sp.speak(u);
            } catch (_) {}
        }

        // ── Timeout helpers ────────────────────────────────────────────────────
        function scheduleTimeout(fn, ms) {
            const id = setTimeout(fn, ms);
            activeTimeouts.push(id);
            return id;
        }
        function clearAllTimeouts() { activeTimeouts.forEach(clearTimeout); activeTimeouts = []; }
        function clearAllTimers() {
            clearInterval(timer); clearInterval(restTimer); clearInterval(t2Interval);
            clearAllTimeouts();
            timer = restTimer = t2Interval = null;
        }

        // ── Pause — shared by train + rest screens (Point 3) ──────────────────
        window.triggerPause = function() {
            state.isPaused = !state.isPaused;

            // Update both pause buttons simultaneously
            ['pause-btn', 'rest-pause-btn'].forEach(id => {
                const btn = $(id);
                if (!btn) return;
                btn.textContent      = state.isPaused ? '繼續' : '暫停';
                btn.style.background = state.isPaused ? 'var(--green)' : 'var(--red)';
                btn.style.color      = state.isPaused ? '#000' : '#fff';
            });

            if (state.isPaused) {
                sp.cancel();
                $('silent-audio').pause();
            } else {
                $('silent-audio').play().catch(() => {});
            }
        };

        // ── Session start ──────────────────────────────────────────────────────
        window.triggerStart = function() {
            const parse = (id, fb, min) => { const v = parseInt($(id).value); return isNaN(v)||v<min ? fb : v; };
            state.targetReps1 = parse('tr1-in', 1, 1);
            state.targetReps2 = parse('tr2-in', 0, 0);
            state.targetSets  = parse('ts-in',  1, 1);
            state.currentSet  = 1; state.isT2 = false;
            requestWakeLock();
            startSet();
        };

        window.resetToHome = function() {
            clearAllTimers(); sp.cancel(); releaseWakeLock(); showScreen('h');
        };

        window.restartCurrentPhase = function() {
            clearInterval(timer); clearInterval(t2Interval);
            clearAllTimeouts(); timer = t2Interval = null; sp.cancel();
            state.isT2 ? transitionToT2(true) : startSet();
        };

        // ── Start a set ────────────────────────────────────────────────────────
        function startSet() {
            showScreen('train-scr');
            state.rep = 1; state.count = 1; state.isPaused = false;

            const btn = $('pause-btn');
            btn.textContent = '暫停'; btn.style.background = 'var(--red)'; btn.style.color = '#fff';

            const lbl = $('count-label');
            lbl.textContent = T.ready; lbl.style.color = 'var(--yellow)';
            setBeatDots(0, false);

            $('status-label').textContent = `Set ${state.currentSet} / ${state.targetSets} | T1`;
            $('silent-audio').play().catch(() => {});

            speak(T.ready, 1.0);
            let t = 0;
            T.cdNums.forEach((n, i) => {
                scheduleTimeout(() => { lbl.textContent = n; speak(T.cdSpeak[i]); }, (++t) * 1000);
            });
            scheduleTimeout(() => {
                lbl.textContent = T.go; lbl.style.color = 'var(--green)';
                speak(T.go, 1.2);
                scheduleTimeout(runLogic, 1000);
            }, ++t * 1000);
        }

        // ── Main tempo tick ────────────────────────────────────────────────────
        function runLogic() {
            const lbl = $('count-label');
            lbl.style.color = 'var(--green)';

            function tick() {
                if (state.isPaused) return;

                const target = state.isT2 ? state.targetReps2 : state.targetReps1;

                // Point 1: always show rep number; dots show which beat we're on
                lbl.textContent = state.rep;
                setBeatDots(state.count, true);

                // Beat 1 → say rep number; beats 2-4 → say 二/三/四
                speak(state.count === 1 ? String(state.rep) : T.beats[state.count - 1]);

                if (state.rep >= target && state.count >= 4) {
                    clearInterval(timer);
                    scheduleTimeout(() => {
                        setBeatDots(0, false);
                        (!state.isT2 && state.targetReps2 > 0) ? transitionToT2(false) : finishSet();
                    }, 1000);
                    return;
                }

                state.count++;
                if (state.count > 4) { state.count = 1; state.rep++; }
            }

            tick();
            timer = setInterval(tick, 1000);
        }

        // ── T2 transition ──────────────────────────────────────────────────────
        function transitionToT2(isRestart) {
            state.isT2 = true; state.rep = 1; state.count = 1;
            const lbl = $('count-label');
            lbl.textContent = T.ready; lbl.style.color = 'var(--yellow)';
            setBeatDots(0, false);
            $('status-label').textContent = `Set ${state.currentSet} / ${state.targetSets} | T2`;
            speak(isRestart ? T.t2Restart : T.t1Done, 1.0);

            let tLeft = 6;
            t2Interval = setInterval(() => {
                if (state.isPaused) return;
                tLeft--;
                const cdIdx = 3 - tLeft;
                lbl.textContent = tLeft > 0 ? (T.cdNums[cdIdx] ?? tLeft) : T.go;
                if (tLeft > 0 && tLeft <= 3) speak(T.cdSpeak[cdIdx]);
                if (tLeft <= 0) {
                    clearInterval(t2Interval);
                    lbl.style.color = 'var(--green)';
                    speak(T.go, 1.2);
                    scheduleTimeout(runLogic, 1000);
                }
            }, 1000);
        }

        // ── Finish set ─────────────────────────────────────────────────────────
        function finishSet() {
            if (state.currentSet >= state.targetSets) {
                showFinalCongrats();
            } else {
                state.isT2 = false;
                startRest();
            }
        }

        // ── Rest countdown ─────────────────────────────────────────────────────
        function startRest() {
            showScreen('rest-scr');
            state.plusCount = 0; state.timeLeft = 60; state.isPaused = false;

            // Reset rest pause button
            const rBtn = $('rest-pause-btn');
            rBtn.textContent = '暫停'; rBtn.style.background = 'var(--red)'; rBtn.style.color = '#fff';

            $('diu-msg').textContent    = '';
            $('rest-clock').style.color = 'var(--green)';
            $('rest-clock').textContent = state.timeLeft;

            restTimer = setInterval(() => {
                if (state.isPaused) return;   // Point 3 fix: honour pause during rest
                state.timeLeft--;
                $('rest-clock').textContent = state.timeLeft;
                if (state.timeLeft === 10) speak(T.tenLeft, 1.0);
                if (state.timeLeft > 0 && state.timeLeft <= 3) speak(String(state.timeLeft));
                if (state.timeLeft <= 0) { clearInterval(restTimer); state.currentSet++; startSet(); }
            }, 1000);
        }

        window.addTenSeconds = function() {
            if (state.plusCount < 2) {
                state.timeLeft += 10; state.plusCount++;
                $('rest-clock').textContent = state.timeLeft;
                speak(T.tenMore, 1.1);
            } else {
                $('diu-msg').textContent    = 'Diu你咩抖咁耐';
                $('rest-clock').style.color = 'var(--red)';
                speak(T.stopRest, 1.0);
            }
        };

        window.skipRest = function() {
            clearInterval(restTimer); state.currentSet++; state.isT2 = false; startSet();
        };

        // ── Congrats ───────────────────────────────────────────────────────────
        function showFinalCongrats() {
            speak(T.congrats, 1.0);
            showScreen('co');
        }

    })();
    </script>
</body>
</html>
